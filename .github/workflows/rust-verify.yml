name: rust-verify

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  verify-katas:
    name: Verify Katas Compile & Pass
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training/kata_suite
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  lint-markdown:
    name: Lint Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown files exist
        run: |
          echo "=== Verifying governance pack structure ==="
          test -f README.md && echo "✅ README.md"
          test -f LICENSE && echo "✅ LICENSE"
          test -f ARCHITECTURE.md && echo "✅ ARCHITECTURE.md"
          test -f deny.toml && echo "✅ deny.toml"
          test -d .agent/rules && echo "✅ .agent/rules/"
          test -d .agent/skills && echo "✅ .agent/skills/"
          test -d .agent/workflows && echo "✅ .agent/workflows/"
          test -d training/kata_suite && echo "✅ training/kata_suite/"
          test -d docs && echo "✅ docs/"
          echo ""
          echo "Rules: $(ls .agent/rules/*.md | wc -l)"
          echo "Skills: $(ls -d .agent/skills/*/ | wc -l)"
          echo "Katas: $(ls training/kata_suite/src/kata*.rs 2>/dev/null | wc -l)"
          echo ""
          echo "✅ All governance files present"

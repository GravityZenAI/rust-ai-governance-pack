<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
body {
  width: 400px;
  height: 400px;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>
<svg viewBox="0 0 400 450" width="400" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d333b" />
      <stop offset="50%" style="stop-color:#21262d" />
      <stop offset="100%" style="stop-color:#161b22" />
    </linearGradient>
    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#CE422B;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.9" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Orange glow behind -->
    <radialGradient id="orangeGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#CE422B;stop-opacity:0.3" />
      <stop offset="60%" style="stop-color:#CE422B;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#CE422B;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Orange glow -->
  <ellipse cx="200" cy="190" rx="180" ry="180" fill="url(#orangeGlow)"/>

  <!-- Shield body -->
  <path d="M200 30 L360 100 L345 270 Q310 370 200 420 Q90 370 55 270 L40 100 Z" 
        fill="url(#shieldGrad)" stroke="url(#borderGrad)" stroke-width="3"/>

  <!-- Hexagonal grid -->
  <g opacity="0.25" stroke="#00d4ff" stroke-width="1" fill="none">
    <!-- Row 1 -->
    <polygon points="170,100 190,88 210,100 210,124 190,136 170,124"/>
    <polygon points="210,100 230,88 250,100 250,124 230,136 210,124"/>
    <!-- Row 2 -->
    <polygon points="150,130 170,118 190,130 190,154 170,166 150,154"/>
    <polygon points="190,130 210,118 230,130 230,154 210,166 190,154"/>
    <polygon points="230,130 250,118 270,130 270,154 250,166 230,154"/>
    <!-- Row 3 -->
    <polygon points="130,160 150,148 170,160 170,184 150,196 130,184"/>
    <polygon points="170,160 190,148 210,160 210,184 190,196 170,184"/>
    <polygon points="210,160 230,148 250,160 250,184 230,196 210,184"/>
    <polygon points="250,160 270,148 290,160 290,184 270,196 250,184"/>
    <!-- Row 4 -->
    <polygon points="150,190 170,178 190,190 190,214 170,226 150,214"/>
    <polygon points="190,190 210,178 230,190 230,214 210,226 190,214"/>
    <polygon points="230,190 250,178 270,190 270,214 250,226 230,214"/>
    <!-- Row 5 -->
    <polygon points="170,220 190,208 210,220 210,244 190,256 170,244"/>
    <polygon points="210,220 230,208 250,220 250,244 230,256 210,244"/>
    <!-- Row 6 -->
    <polygon points="190,250 210,238 230,250 230,274 210,286 190,274"/>
  </g>

  <!-- Circuit traces -->
  <g stroke="#00d4ff" stroke-width="1.5" opacity="0.6" filter="url(#glow)">
    <line x1="140" y1="120" x2="200" y2="160"/>
    <circle cx="200" cy="160" r="3" fill="#00d4ff"/>
    <line x1="200" y1="160" x2="260" y2="130"/>
    <line x1="200" y1="160" x2="200" y2="220"/>
    <circle cx="200" cy="220" r="4" fill="#CE422B"/>
    <line x1="200" y1="220" x2="150" y2="260"/>
    <line x1="200" y1="220" x2="250" y2="260"/>
    <line x1="200" y1="220" x2="200" y2="300"/>
    <circle cx="200" cy="300" r="3" fill="#00d4ff"/>
  </g>

  <!-- Checkmark -->
  <g transform="translate(172, 185)">
    <polyline points="5,28 18,42 52,8" stroke="#3fb950" stroke-width="6" fill="none" 
              stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>

  <!-- Text "R" for Rust -->
  <text x="200" y="380" text-anchor="middle" font-family="'Segoe UI', sans-serif" 
        font-size="36" font-weight="800" fill="#8b949e" opacity="0.4">
    GOVERNANCE
  </text>
</svg>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px;
  height: 320px;
  overflow: hidden;
  background: linear-gradient(135deg, #0d1117 0%, #161b22 40%, #1a1a2e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  position: relative;
}

/* Subtle grid pattern */
body::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Orange glow behind shield */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(206,66,43,0.25) 0%, rgba(206,66,43,0.08) 40%, transparent 70%);
  border-radius: 50%;
  left: 120px;
  top: 10px;
}

.container {
  display: flex;
  align-items: center;
  gap: 60px;
  z-index: 1;
  position: relative;
}

/* Shield icon */
.shield {
  width: 160px;
  height: 180px;
  position: relative;
}

.shield svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 20px rgba(0,212,255,0.3));
}

.text-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.title {
  font-size: 42px;
  font-weight: 800;
  color: #e6edf3;
  letter-spacing: -1px;
  line-height: 1;
}

.title span {
  color: #CE422B;
}

.subtitle {
  font-size: 17px;
  color: #8b949e;
  font-weight: 400;
  letter-spacing: 0.5px;
}

.tags {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}

.tag {
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.tag-rules {
  background: rgba(255,107,53,0.15);
  color: #ff6b35;
  border: 1px solid rgba(255,107,53,0.3);
}

.tag-skills {
  background: rgba(0,212,255,0.12);
  color: #00d4ff;
  border: 1px solid rgba(0,212,255,0.3);
}

.tag-gates {
  background: rgba(46,160,67,0.12);
  color: #3fb950;
  border: 1px solid rgba(46,160,67,0.3);
}

.tag-katas {
  background: rgba(124,58,237,0.12);
  color: #a78bfa;
  border: 1px solid rgba(124,58,237,0.3);
}

/* Circuit traces decoration */
.circuit-left {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 60px;
  height: 200px;
  opacity: 0.15;
}

.circuit-right {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 60px;
  height: 200px;
  opacity: 0.15;
}
</style>
</head>
<body>
  <div class="glow"></div>
  
  <!-- Left circuit traces -->
  <svg class="circuit-left" viewBox="0 0 60 200">
    <line x1="30" y1="0" x2="30" y2="60" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="30" cy="60" r="3" fill="#00d4ff"/>
    <line x1="30" y1="60" x2="50" y2="80" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="50" cy="80" r="2" fill="#00d4ff"/>
    <line x1="50" y1="80" x2="50" y2="120" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="50" cy="120" r="3" fill="#00d4ff"/>
    <line x1="50" y1="120" x2="20" y2="150" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="20" cy="150" r="2" fill="#00d4ff"/>
    <line x1="20" y1="150" x2="20" y2="200" stroke="#00d4ff" stroke-width="1.5"/>
  </svg>

  <!-- Right circuit traces -->
  <svg class="circuit-right" viewBox="0 0 60 200">
    <line x1="30" y1="0" x2="30" y2="40" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="30" cy="40" r="2" fill="#00d4ff"/>
    <line x1="30" y1="40" x2="10" y2="70" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="10" cy="70" r="3" fill="#00d4ff"/>
    <line x1="10" y1="70" x2="10" y2="130" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="10" cy="130" r="2" fill="#00d4ff"/>
    <line x1="10" y1="130" x2="40" y2="160" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="40" cy="160" r="3" fill="#00d4ff"/>
    <line x1="40" y1="160" x2="40" y2="200" stroke="#00d4ff" stroke-width="1.5"/>
  </svg>

  <div class="container">
    <!-- Shield SVG -->
    <div class="shield">
      <svg viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
        <!-- Shield shape -->
        <defs>
          <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2d333b;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#21262d;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
            <stop offset="50%" style="stop-color:#CE422B;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.8" />
          </linearGradient>
        </defs>
        
        <!-- Shield body -->
        <path d="M80 10 L145 40 L140 110 Q130 150 80 175 Q30 150 20 110 L15 40 Z" 
              fill="url(#shieldGrad)" stroke="url(#strokeGrad)" stroke-width="2"/>
        
        <!-- Hexagonal grid inside shield -->
        <g opacity="0.3" stroke="#00d4ff" stroke-width="0.8" fill="none">
          <!-- Row 1 -->
          <polygon points="65,45 75,40 85,45 85,55 75,60 65,55"/>
          <polygon points="85,45 95,40 105,45 105,55 95,60 85,55"/>
          <!-- Row 2 -->
          <polygon points="55,60 65,55 75,60 75,70 65,75 55,70"/>
          <polygon points="75,60 85,55 95,60 95,70 85,75 75,70"/>
          <polygon points="95,60 105,55 115,60 115,70 105,75 95,70"/>
          <!-- Row 3 -->
          <polygon points="45,75 55,70 65,75 65,85 55,90 45,85"/>
          <polygon points="65,75 75,70 85,75 85,85 75,90 65,85"/>
          <polygon points="85,75 95,70 105,75 105,85 95,90 85,85"/>
          <polygon points="105,75 115,70 125,75 125,85 115,90 105,85"/>
          <!-- Row 4 -->
          <polygon points="55,90 65,85 75,90 75,100 65,105 55,100"/>
          <polygon points="75,90 85,85 95,90 95,100 85,105 75,100"/>
          <polygon points="95,90 105,85 115,90 115,100 105,105 95,100"/>
          <!-- Row 5 -->
          <polygon points="65,105 75,100 85,105 85,115 75,120 65,115"/>
          <polygon points="85,105 95,100 105,105 105,115 95,120 85,115"/>
          <!-- Row 6 -->
          <polygon points="75,120 85,115 95,120 95,130 85,135 75,130"/>
        </g>
        
        <!-- Circuit traces on shield -->
        <g stroke="#00d4ff" stroke-width="1" opacity="0.5">
          <line x1="60" y1="50" x2="80" y2="65"/>
          <circle cx="80" cy="65" r="2" fill="#00d4ff"/>
          <line x1="80" y1="65" x2="100" y2="55"/>
          <line x1="80" y1="65" x2="80" y2="90"/>
          <circle cx="80" cy="90" r="2.5" fill="#CE422B"/>
          <line x1="80" y1="90" x2="60" y2="105"/>
          <line x1="80" y1="90" x2="100" y2="105"/>
          <line x1="80" y1="90" x2="80" y2="125"/>
          <circle cx="80" cy="125" r="2" fill="#00d4ff"/>
        </g>

        <!-- Checkmark in center -->
        <g transform="translate(68, 78)">
          <polyline points="3,12 9,18 21,6" stroke="#3fb950" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </svg>
    </div>

    <!-- Text -->
    <div class="text-group">
      <div class="title"><span>Rust</span> AI Governance Pack</div>
      <div class="subtitle">Make AI coding agents produce Rust that is verifiable, secure, and repeatable.</div>
      <div class="tags">
        <span class="tag tag-rules">8 Rules</span>
        <span class="tag tag-skills">9 Skills</span>
        <span class="tag tag-gates">7 Gates</span>
        <span class="tag tag-katas">20 Katas</span>
      </div>
    </div>
  </div>
</body>
</html>
